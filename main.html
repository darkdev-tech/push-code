<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JuneX Ultra Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-image: url("https://i.ibb.co/pBbsqnJf/ac09079ffdcb.jpg");
      background-size: cover;
      background-position: center;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .floating-pad {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 30, 60, 0.95);
      border: 2px solid #1a6fd4;
      border-radius: 20px;
      padding: 30px 25px;
      width: 90%;
      max-width: 400px;
      box-shadow: 
        0 0 20px rgba(26, 111, 212, 0.4),
        0 0 40px rgba(26, 111, 212, 0.2),
        inset 0 0 30px rgba(26, 111, 212, 0.1);
      animation: glow 2.5s ease-in-out infinite;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    @keyframes glow {
      0%, 100% {
        box-shadow: 
          0 0 20px rgba(26, 111, 212, 0.4),
          0 0 40px rgba(26, 111, 212, 0.2),
          inset 0 0 30px rgba(26, 111, 212, 0.1);
      }
      50% {
        box-shadow: 
          0 0 30px rgba(26, 111, 212, 0.6),
          0 0 50px rgba(26, 111, 212, 0.4),
          inset 0 0 40px rgba(26, 111, 212, 0.15);
      }
    }

    .pad-title {
      text-align: center;
      color: #e5f5f1;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      --color: #e5f5f1;
      --color2: rgb(0, 0, 0);
      width: 100%;
      padding: 0.9em 1.5em;
      background: linear-gradient(135deg, #1a6fd4 0%, #1554b8 100%);
      border-radius: 10px;
      border: 2px solid #1a6fd4;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      text-transform: uppercase;
      color: var(--color);
      letter-spacing: 0.5px;
      box-shadow: 0 0 15px rgba(26, 111, 212, 0.3);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: -1;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: #5a8fff;
      box-shadow: 
        0 0 20px rgba(26, 111, 212, 0.5),
        0 5px 15px rgba(26, 111, 212, 0.3),
        inset 0 0 20px rgba(90, 143, 255, 0.1);
      background: linear-gradient(135deg, #2575dc 0%, #1a6fd4 100%);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 
        0 0 10px rgba(26, 111, 212, 0.3),
        inset 0 0 15px rgba(26, 111, 212, 0.2);
    }

    @media (max-width: 600px) {
      .floating-pad {
        width: 95%;
        max-width: 350px;
        padding: 25px 20px;
      }

      .pad-title {
        font-size: 16px;
      }

      .btn {
        font-size: 13px;
        padding: 0.8em 1.2em;
      }
    }

    @media (max-width: 400px) {
      .floating-pad {
        width: 95%;
        padding: 20px 15px;
        bottom: 20px;
      }

      .pad-title {
        font-size: 14px;
        margin-bottom: 15px;
      }

      .buttons-container {
        gap: 10px;
      }

      .btn {
        font-size: 12px;
        padding: 0.7em 1em;
      }
    }
  </style>
</head>
<body>

  <div class="floating-pad">
    <div class="pad-title">Pair Your Device</div>
    <div class="buttons-container">
      <button onclick="window.open(`/pair`)" class="btn">🔗 Pair Code</button>
      <button onclick="window.open(`/qr`)" class="btn">📱 QR Scan</button>
      <button onclick="window.open(`https://github.com/Vinpink2/June-Ultra/fork`)" class="btn">⭐ Fork Repo</button>
    </div>
  </div>

</body>
</html>
